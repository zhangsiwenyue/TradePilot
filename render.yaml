# Render Blueprint for tradepilot-web.onrender.com (FREE tier, $0/mo)
#
# One free web service serves both the FastAPI API and the built React SPA from
# the same origin (required because the frontend uses a relative WebSocket URL
# /ws/notify and a relative API base /api).
#
# Free-tier tradeoffs:
#   * The service SLEEPS after 15 minutes idle; first request after sleep takes
#     ~20–40 s to wake.
#   * No paid worker, so background loops (price refresh / news / settlements)
#     run INSIDE the API process via AI_TRADER_API_BACKGROUND_TASKS=true. They
#     pause whenever the web service sleeps.
#   * No managed Postgres: bring your own free Neon Postgres database and paste
#     its connection string into the DATABASE_URL secret in the dashboard.
#       1. Sign up at https://console.neon.tech (free 0.5 GB).
#       2. Create project "tradepilot".
#       3. Copy the postgresql://... connection string (ensure ?sslmode=require).
#       4. Paste into Render → tradepilot-web → Environment → DATABASE_URL.
#
# Apply with: Render dashboard → Blueprints → New from this repo (render.yaml).
# Secrets marked `sync: false` MUST be filled in the dashboard after first apply
# (Render will block deploy until they are set).

services:
  # ----- Web (API + SPA, free tier) -------------------------------------------
  - type: web
    name: tradepilot-web
    runtime: python
    plan: free                # 0.1 CPU / 512 MB, sleeps after 15 min idle
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: |
      set -euo pipefail
      python -m pip install --upgrade pip
      python -m pip install -r service/requirements.txt
      # Render's Python runtime ships Node; build the SPA into service/frontend/dist
      cd service/frontend
      npm ci --no-audit --no-fund
      npm run build
    startCommand: |
      cd service/server && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --proxy-headers --forwarded-allow-ips "*"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CLAWTRADER_CORS_ORIGINS
        value: https://tradepilot-web.onrender.com
      - key: API_STDERR_LOG
        value: "true"
      # No separate worker on free tier: run background loops inside the API
      # process. They pause when the web service sleeps.
      - key: AI_TRADER_API_BACKGROUND_TASKS
        value: "true"
      - key: ALLOW_SYNC_PRICE_FETCH_IN_API
        value: "true"
      - key: FORCE_MARKET_OPEN
        value: "false"
      # SQLite path is unused once DATABASE_URL points to Postgres, but keep it
      # set so any code that resolves a default path doesn't fall back outside
      # the project root.
      - key: DB_PATH
        value: service/server/data/clawtrader.db
      - key: NODE_VERSION
        value: "20"
      # ---- secrets: fill these in the Render dashboard after first apply ----
      # Neon (or any) Postgres connection string. REQUIRED — SQLite is not
      # durable on Render's ephemeral disk.
      - key: DATABASE_URL
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: ADANOS_API_KEY
        sync: false
